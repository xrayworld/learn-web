<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes tw  { 0%,100%{opacity:.1} 50%{opacity:.75} }
      @keyframes tw2 { 0%,100%{opacity:.08} 50%{opacity:.55} }
      @keyframes tw3 { 0%,100%{opacity:.05} 50%{opacity:.4}  }
      .s1 { animation: tw  2.3s ease-in-out infinite }
      .s2 { animation: tw  3.0s ease-in-out infinite .9s }
      .s3 { animation: tw2 1.8s ease-in-out infinite 1.6s }
      .s4 { animation: tw3 2.8s ease-in-out infinite .4s }
      .s5 { animation: tw  3.5s ease-in-out infinite 2.1s }

      @keyframes si { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
      .ta { animation: si .9s ease-out .15s both }

      @keyframes fu { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
      .tb { animation: fu .8s ease-out .85s both }
      .tc { animation: fu .8s ease-out 1.1s both }
      .td { animation: fu .8s ease-out 1.35s both }

      @keyframes glowIn { from{opacity:0} to{opacity:1} }
      .ge { animation: glowIn 2s ease-out .1s both }
    </style>

    <clipPath id="gc">
      <circle cx="155" cy="130" r="80"/>
    </clipPath>

    <radialGradient id="atm" cx="36%" cy="31%" r="65%">
      <stop offset="0%"   stop-color="#4a90ff" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#00001e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shad" cx="68%" cy="70%" r="52%">
      <stop offset="10%"  stop-color="#00001e" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#00001e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="northglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffc30f" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ffc30f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ▬▬▬ BACKGROUND ▬▬▬ -->
  <rect width="900" height="260" fill="#00001e"/>

  <!-- ▬▬▬ STAR FIELD ▬▬▬ -->
  <circle class="s1" cx="32"  cy="20"  r="1"   fill="white"/>
  <circle class="s2" cx="76"  cy="52"  r=".8"  fill="white"/>
  <circle class="s3" cx="118" cy="11"  r="1.1" fill="white"/>
  <circle class="s4" cx="43"  cy="212" r=".9"  fill="white"/>
  <circle class="s1" cx="12"  cy="148" r=".7"  fill="white"/>
  <circle class="s5" cx="282" cy="28"  r=".9"  fill="white"/>
  <circle class="s2" cx="305" cy="247" r=".8"  fill="white"/>
  <circle class="s3" cx="695" cy="24"  r="1"   fill="white"/>
  <circle class="s1" cx="753" cy="249" r=".9"  fill="white"/>
  <circle class="s4" cx="846" cy="41"  r=".8"  fill="white"/>
  <circle class="s2" cx="879" cy="207" r="1"   fill="white"/>
  <circle class="s5" cx="818" cy="129" r=".7"  fill="white"/>
  <circle class="s3" cx="649" cy="245" r=".9"  fill="white"/>
  <circle class="s1" cx="586" cy="15"  r=".8"  fill="white"/>
  <circle class="s4" cx="491" cy="253" r=".7"  fill="white"/>
  <circle class="s2" cx="413" cy="7"   r=".9"  fill="white"/>
  <circle class="s5" cx="210" cy="238" r=".7"  fill="white"/>
  <circle class="s1" cx="262" cy="250" r=".6"  fill="white"/>
  <circle class="s3" cx="548" cy="250" r=".8"  fill="white"/>
  <circle class="s4" cx="740" cy="12"  r=".7"  fill="white"/>

  <!-- ▬▬▬ GLOBE ATMOSPHERE HALO ▬▬▬ -->
  <circle class="ge" cx="155" cy="130" r="98" fill="url(#atm)"/>

  <!-- ▬▬▬ GLOBE BASE ▬▬▬ -->
  <circle cx="155" cy="130" r="80" fill="rgba(0,4,28,.90)" stroke="rgba(100,155,255,.2)" stroke-width=".8"/>

  <!-- ▬▬▬ LATITUDE LINES (static) ▬▬▬ -->
  <g clip-path="url(#gc)">
    <ellipse cx="155" cy="130" rx="80"  ry="5.0" fill="none" stroke="rgba(100,155,255,.18)" stroke-width=".6"/>
    <ellipse cx="155" cy="108" rx="68"  ry="4.5" fill="none" stroke="rgba(100,155,255,.14)" stroke-width=".55"/>
    <ellipse cx="155" cy="86"  rx="47"  ry="3.5" fill="none" stroke="rgba(100,155,255,.11)" stroke-width=".5"/>
    <ellipse cx="155" cy="63"  rx="20"  ry="2.0" fill="none" stroke="rgba(100,155,255,.08)" stroke-width=".4"/>
    <ellipse cx="155" cy="152" rx="68"  ry="4.5" fill="none" stroke="rgba(100,155,255,.14)" stroke-width=".55"/>
    <ellipse cx="155" cy="174" rx="47"  ry="3.5" fill="none" stroke="rgba(100,155,255,.11)" stroke-width=".5"/>
    <ellipse cx="155" cy="197" rx="20"  ry="2.0" fill="none" stroke="rgba(100,155,255,.08)" stroke-width=".4"/>
  </g>

  <!-- ▬▬▬ MERIDIAN LINES (SMIL animated rotation) ▬▬▬ -->
  <g clip-path="url(#gc)">
    <!-- Meridian 1 — 0° phase (starts as vertical line, rotates to full circle) -->
    <ellipse cx="155" cy="130" rx="0" ry="80" fill="none" stroke="rgba(100,155,255,.32)" stroke-width=".9">
      <animate attributeName="rx"
               values="0;80;0;80;0" dur="8s" repeatCount="indefinite"
               calcMode="spline"
               keyTimes="0;.25;.5;.75;1"
               keySplines=".5 0 .5 1;.5 0 .5 1;.5 0 .5 1;.5 0 .5 1"/>
      <animate attributeName="opacity" values=".85;.22;.85;.22;.85" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Meridian 2 — 90° phase -->
    <ellipse cx="155" cy="130" rx="80" ry="80" fill="none" stroke="rgba(100,155,255,.32)" stroke-width=".9">
      <animate attributeName="rx"
               values="80;0;80;0;80" dur="8s" repeatCount="indefinite"
               calcMode="spline"
               keyTimes="0;.25;.5;.75;1"
               keySplines=".5 0 .5 1;.5 0 .5 1;.5 0 .5 1;.5 0 .5 1"/>
      <animate attributeName="opacity" values=".22;.85;.22;.85;.22" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Meridian 3 — 45° phase -->
    <ellipse cx="155" cy="130" rx="57" ry="80" fill="none" stroke="rgba(100,155,255,.2)" stroke-width=".6">
      <animate attributeName="rx" values="57;80;0;80;57" dur="8s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".48;.22;.85;.22;.48" dur="8s" begin="-2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Meridian 4 — 135° phase -->
    <ellipse cx="155" cy="130" rx="57" ry="80" fill="none" stroke="rgba(100,155,255,.2)" stroke-width=".6">
      <animate attributeName="rx" values="57;0;80;0;57" dur="8s" begin="-6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".48;.85;.22;.85;.48" dur="8s" begin="-6s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ▬▬▬ GLOBE SHADOW OVERLAY ▬▬▬ -->
  <circle cx="155" cy="130" r="80" fill="url(#shad)"/>

  <!-- ▬▬▬ GLOBE OUTER RING GLOW ▬▬▬ -->
  <circle cx="155" cy="130" r="81" fill="none" stroke="rgba(100,155,255,.06)" stroke-width="7"/>

  <!-- ▬▬▬ NORTH POLE ACCENT DOT ▬▬▬ -->
  <circle cx="155" cy="51" r="4" fill="url(#northglow)"/>
  <circle cx="155" cy="51" r="2" fill="#ffc30f" opacity=".82"/>

  <!-- ▬▬▬ VERTICAL DIVIDER ▬▬▬ -->
  <line x1="292" y1="44" x2="292" y2="216" stroke="rgba(255,195,15,.14)" stroke-width=".8"/>

  <!-- ▬▬▬ TITLE — SUB (gold bold) + TERRA (ivory ultralight) ▬▬▬ -->
  <g class="ta">
    <text y="152" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="74">
      <tspan x="326" font-weight="700" fill="#ffc30f"  letter-spacing="4">SUB</tspan><tspan
             font-weight="100" fill="#ffffe1" letter-spacing="4" dx="5">TERRA</tspan>
    </text>
  </g>

  <!-- ▬▬▬ UNDERLINE ▬▬▬ -->
  <line class="tb" x1="326" y1="163" x2="878" y2="163" stroke="rgba(255,195,15,.22)" stroke-width=".7"/>

  <!-- ▬▬▬ TAGLINE ▬▬▬ -->
  <text class="tc" x="326" y="184"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="300" font-size="12" fill="rgba(255,255,225,.52)" letter-spacing="5">
    CREATIVE  ·  BTL MARKETING  ·  STUDIO
  </text>

  <!-- ▬▬▬ TECH STACK ▬▬▬ -->
  <text class="td" x="326" y="204"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="300" font-size="10" fill="rgba(255,195,15,.58)" letter-spacing="3">
    HTML5  ·  SCSS  ·  VANILLA JS  ·  CSS 3D EARTH  ·  LIMA, PE
  </text>

  <!-- ▬▬▬ NAV MAP DOTS (decorative — mirrors the app's nav-map UI) ▬▬▬ -->
  <g class="td" transform="translate(863,96)">
    <circle cy="0"  r="3"   fill="rgba(255,255,225,.72)"/>
    <circle cy="16" r="2.5" fill="none" stroke="rgba(255,255,225,.38)" stroke-width=".8"/>
    <circle cy="32" r="2.5" fill="none" stroke="rgba(255,255,225,.38)" stroke-width=".8"/>
    <circle cy="48" r="2.5" fill="none" stroke="rgba(255,255,225,.38)" stroke-width=".8"/>
    <circle cy="64" r="2.5" fill="none" stroke="rgba(255,255,225,.38)" stroke-width=".8"/>
  </g>

  <!-- ▬▬▬ BOTTOM RULE ▬▬▬ -->
  <line x1="326" y1="218" x2="850" y2="218" stroke="rgba(255,255,225,.05)" stroke-width=".5"/>
</svg>
